name: CI - Testes Automáticos

on:
  push:
    branches: [ "main", "develop_rinaldo" ]
  pull_request:
    branches: [ "main" ]

  workflow_dispatch:

jobs:
  testes-backend:
    name: Rodar Testes do Backend (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar testes com pytest
        run: pytest backend/test_db.py -v

  testes-frontend:
    name: Rodar Testes do Frontend (Playwright)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Instalar Playwright e dependências do sistema
        run: npx playwright install --with-deps chromium

      - name: Rodar testes Playwright
        run: npm test

      - name: Upload do relatório de testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
